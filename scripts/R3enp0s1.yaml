network:
    version: 2
    ethernets:
      enp0s1:
        dhcp4: false
        dhcp6: false
        accept-ra: false
        nameservers:
          addresses:
            - 172.16.0.2
            - 2001:678:3fc:3::2

    vlans:
      # Temporary Internet access
      enp0s1.28:
        id: 28
        link: enp0s1
        dhcp4: true
        dhcp6: false
        accept-ra: true
      # R3 -> R1
      enp0s1.441:
        id: 441
        link: enp0s1
        addresses:
          - 10.44.1.3/29
          - fe80::1b9:3/64
      # R3 -> R2
      enp0s1.442:
        id: 442
        link: enp0s1
        addresses:
          - 10.44.2.3/29
          - fe80::1ba:3/64
      # management
      enp0s1.99:
        id: 99
        link: enp0s1
        addresses:
          - 10.99.0.3/24
          - fd14:ca46:3864:99::3/64